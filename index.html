<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Ultra Realistic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div id="ground"></div>
            <div id="entities">
                <div id="player"></div>
            </div>
        </div>
        <div id="vignette"></div>
    </div>

    <div id="ui">
        <div class="hotbar">
            <div class="slot active">⛏️</div>
            <div class="slot">🌱</div>
            <div class="slot">💧</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const ground = document.getElementById('ground');
        const entities = document.getElementById('entities');
        
        let pX = 800, pY = 800;
        let frame = 0;
        let direction = 0; // 0: Down, 1: Up, 2: Left, 3: Right
        let isMoving = false;
        let lastTime = 0;

        // Gerar o grid de terra (20x20)
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.onclick = (e) => {
                tile.classList.add('plowed');
                // Partícula de poeira na posição do clique
                const rect = world.getBoundingClientRect();
                createDust(e.pageX - rect.left, e.pageY - rect.top);
            };
            ground.appendChild(tile);
        }

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function createDust(x, y) {
            const dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.left = (x - 4) + 'px';
            dust.style.top = (y - 4) + 'px';
            entities.appendChild(dust);
            setTimeout(() => dust.remove(), 600);
        }

        function gameLoop(timestamp) {
            isMoving = false;
            const speed = 4;

            if (keys['w']) { pY -= speed; direction = 1; isMoving = true; }
            else if (keys['s']) { pY += speed; direction = 0; isMoving = true; }
            
            if (keys['a']) { pX -= speed; direction = 2; isMoving = true; }
            else if (keys['d']) { pX += speed; direction = 3; isMoving = true; }

            // Animação de Sprite
            if (isMoving) {
                if (timestamp - lastTime > 100) {
                    frame = (frame + 1) % 4;
                    lastTime = timestamp;
                }
            } else {
                frame = 0;
            }

            const spriteSize = 64;
            player.style.backgroundPosition = `-${frame * spriteSize}px -${direction * spriteSize}px`;
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            player.style.zIndex = Math.floor(pY);

            // Câmera segue o jogador
            const camX = -pX + window.innerWidth / 2;
            const camY = -pY + window.innerHeight / 2;
            world.style.transform = `translate(${camX}px, ${camY}px)`;

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">

    <meta charset="UTF-8">

            <div id="player"></div>
        </div>
    </div>

        <div class="inventory">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="water">💧</div>
        </div>
        <div id="energy-meter"><div id="energy-fill"></div></div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const energyFill = document.getElementById('energy-fill');
        
        let pX = 400, pY = 400;
        let energy = 100;
        let frame = 0;
        let direction = 0; // 0: frente, 1: esquerda, 2: direita, 3: costas
        let isWalking = false;

        // Criar o chão
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.onclick = () => {
                if(energy > 0) {
                    tile.classList.add('plowed');
                    energy -= 2;
                    energyFill.style.height = energy + "%";
                }
            };
            document.getElementById('ground').appendChild(tile);
        }

        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function gameLoop() {
            isWalking = false;
            if (keys['w']) { pY -= 4; direction = 3; isWalking = true; }
            if (keys['s']) { pY += 4; direction = 0; isWalking = true; }
            if (keys['a']) { pX -= 4; direction = 1; isWalking = true; }
            if (keys['d']) { pX += 4; direction = 2; isMoving = true; direction = 2; isWalking = true; }

            if (isWalking) {
                // Alterna entre os 4 frames da imagem original
                frame = (Math.floor(Date.now() / 150) % 4);
            } else {
                frame = 0; // Frame de parado
            }

            // AJUSTE DO SPRITE: 
            // Cada frame tem aprox. 48px na imagem original
            let spriteW = 48; 
            let spriteH = 48;
            player.style.backgroundPosition = `-${frame * spriteW}px -${direction * spriteH}px`;
