<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stardew Ultra Pixel - Animated</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="camera">
        <div id="world">
            <div id="ground"></div>
            <div id="entities">
                </div>
        </div>
    </div>

    <div id="ui">
        <div class="inventory">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="axe">🪓</div>
        </div>
    </div>

    <script>
        const entities = document.getElementById('entities');
        const world = document.getElementById('world');
        
        let pX = 800, pY = 800;
        let frame = 0;
        let direction = 'down';
        let isWalking = false;

        // Criar Jogador com a imagem do link
        const player = document.createElement('div');
        player.id = 'player';
        player.style.backgroundImage = "url('https://i.pinimg.com/1200x/ca/d4/d8/cad4d84af7271755cc49ad13b650a113.jpg')";
        entities.appendChild(player);

        // Gerar chão simples (sem poluição visual)
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.left = (i % 20) * 80 + 'px';
            tile.style.top = Math.floor(i / 20) * 80 + 'px';
            tile.onclick = () => tile.classList.add('plowed');
            document.getElementById('ground').appendChild(tile);
        }

        const keys = {};
        window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; isWalking = true; };
        window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; isWalking = false; };

        function update() {
            if (keys['w']) { pY -= 4; direction = 'up'; }
            else if (keys['s']) { pY += 4; direction = 'down'; }
            else if (keys['a']) { pX -= 4; direction = 'left'; }
            else if (keys['d']) { pX += 4; direction = 'right'; }

            // Animação de Sprite baseada na imagem (Grid da imagem)
            if (isWalking) {
                frame = (Math.floor(Date.now() / 150) % 4); // Alterna 4 quadros
            } else {
                frame = 0; // Parado
            }

            // Ajuste das posições do Sprite (aproximado para essa imagem)
            let row = 0;
            if (direction === 'down') row = 0;
            if (direction === 'up') row = 1;
            if (direction === 'left') row = 2;
            if (direction === 'right') row = 3;

            // Move o background da imagem para mostrar o boneco certo
            player.style.backgroundPosition = `-${frame * 48}px -${row * 48}px`;
            
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            player.style.zIndex = Math.floor(pY);

            // Câmera
            world.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
