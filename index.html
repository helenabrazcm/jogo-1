<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Farm Valley</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="map"></div>
        <div id="player"></div>
    </div>

    <div id="ui">
        <p>Use <b>WASD</b> para mover | <b>Clique</b> na terra para arar</p>
    </div>

    <script>
        const player = document.getElementById('player');
        const map = document.getElementById('map');
        let pX = 50;
        let pY = 50;

        // Gerar o chão (Grid)
        for (let i = 0; i < 100; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.addEventListener('click', () => {
                tile.classList.add('plowed');
            });
            map.appendChild(tile);
        }

        // Movimentação
        window.addEventListener('keydown', (e) => {
            const step = 10;
            if (e.key.toLowerCase() === 'w') pY -= step;
            if (e.key.toLowerCase() === 's') pY += step;
            if (e.key.toLowerCase() === 'a') pX -= step;
            if (e.key.toLowerCase() === 'd') pX += step;

            player.style.top = pY + 'px';
            player.style.left = pX + 'px';
        });
    </script>
</body>
</html>
