<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stardew 3D Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #loading-screen {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #222; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; font-size: 2em;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading-screen">Carregando Jogo 3D...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script>
        const loadingScreen = document.getElementById('loading-screen');
        let scene, camera, renderer, player;
        const keys = {};
        const playerSpeed = 0.1;

        // 1. Configurar Cena 3D
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Céu azul claro

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); // Antialias para suavizar bordas
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luz Ambiente
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            // Luz Direcional (Simula o Sol)
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);

            // Chão (Plano Verde)
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x6B8E23 }); // Verde grama
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2; // Gira para ficar plano no chão
            scene.add(ground);

            // Nosso "boneco" (um cubo por enquanto)
            const playerGeometry = new THREE.BoxGeometry(0.5, 1, 0.5); // Proporção de um boneco
            const playerMaterial = new THREE.MeshLambertMaterial({ color: 0xDC143C }); // Vermelho
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.y = 0.5; // Para o cubo ficar em cima do chão
            scene.add(player);

            camera.position.set(0, 2, 5); // Posição inicial da câmera
            camera.lookAt(player.position); // Câmera olhando para o jogador

            loadingScreen.style.display = 'none'; // Esconde a tela de carregamento
            animate();
        }

        // 2. Animação e Loop Principal
        function animate() {
            requestAnimationFrame(animate);

            // Movimentação do Jogador
            if (keys['w']) player.position.z -= playerSpeed;
            if (keys['s']) player.position.z += playerSpeed;
            if (keys['a']) player.position.x -= playerSpeed;
            if (keys['d']) player.position.x += playerSpeed;

            // Câmera segue o jogador (com um pequeno offset para ver de cima/trás)
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 5;
            camera.position.y = player.position.y + 2; // Levemente acima
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        // Eventos de Teclado
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // Redimensionar Câmera ao mudar o tamanho da janela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init(); // Iniciar o jogo
    </script>
</body>
</html>
