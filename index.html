<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="overlay-screen">
        <div class="menu-card">
            <h1>🌾 SERTÃO RPG</h1>
            <div class="menu-buttons">
                <button id="btn-go-to-custom" class="btn-main">JOGAR</button>
                <button id="btn-load" class="btn-secondary">CARREGAR</button>
            </div>
        </div>
    </div>

    <div id="custom-screen" class="overlay-screen" style="display:none;">
        <div class="menu-card">
            <h2>Novo Fazendeiro</h2>
            <input type="text" id="char-name" placeholder="Digite seu nome" maxlength="12">
            <div class="char-selection">
                <button class="skin-option" data-skin="🧑‍🌾">A</button>
                <button class="skin-option" data-skin="👩‍🌾">B</button>
                <button class="skin-option" data-skin="👨‍🌾">C</button>
            </div>
            <div id="preview-box"><span id="preview-emoji">🧑‍🌾</span></div>
            <button id="btn-start-game" class="btn-main">COMEÇAR</button>
        </div>
    </div>

    <div id="game-container" style="display:none;">
        <div id="night-overlay"></div>
        
        <div id="minimap-container">
            <div id="minimap"><div id="minimap-player"></div></div>
        </div>

        <div id="world">
            <div class="plot" style="top: 400px; left: 400px;">🟫</div>
            <div class="plot" style="top: 400px; left: 460px;">🟫</div>
            <div class="npc-shop" style="top: 2000px; left: 2000px;">🏪 MERCADO</div>
            <div id="player">🧑‍🌾</div>
        </div>

        <div id="ui-layer">
            <div class="stat-card">
                <b id="display-name">---</b> | 💰 <span id="gold-val">0</span>
            </div>
            <div id="quest-box">Missão: Colha 3 Trigos (<span id="quest-count">0</span>/3)</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
