<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS Rhythm Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="combo">Combo: 0</div>
            <div id="feedback">READY?</div>
        </div>

        <div class="receptors">
            <div class="receptor" id="key-0">←</div>
            <div class="receptor" id="key-1">↓</div>
            <div class="receptor" id="key-2">↑</div>
            <div class="receptor" id="key-3">→</div>
        </div>

        <div id="note-lane"></div>

        <div id="start-screen">
            <h1>RHYTHM BATTLE</h1>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
