<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Farm Deluxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="world">
        <div id="map"></div>
    </div>

    <div id="player">
        <div class="hair"></div>
        <div class="body"></div>
    </div>

    <div id="night-overlay"></div>

    <div id="ui-container">
        <div id="clock">06:00 AM</div>
        <div class="toolbar">
            <div class="slot active" data-tool="hoe">🪓</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="water">💧</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('map');
        const nightOverlay = document.getElementById('night-overlay');
        const clockEl = document.getElementById('clock');
        const slots = document.querySelectorAll('.slot');
        
        let posX = 2000, posY = 2000; // Posição inicial no grande mapa
        let selectedTool = 'hoe';
        let gameMinutes = 360;

        // Criar um mapa gigante (50x50 tiles de 60px)
        for (let i = 0; i < 2500; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.addEventListener('mousedown', () => useTool(tile));
            world.appendChild(tile);
        }

        function useTool(tile) {
            if (selectedTool === 'hoe') tile.classList.add('plowed');
            if (selectedTool === 'seed' && tile.classList.contains('plowed')) {
                tile.innerHTML = '<div class="crop"></div>';
            }
            if (selectedTool === 'water' && tile.classList.contains('plowed')) {
                tile.style.backgroundColor = '#5d4037'; // Terra molhada
                tile.style.border = "1px solid #3498db";
            }
        }

        // Movimentação Estilo Câmera
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function update() {
            const speed = 5;
            if (keys['w']) posY -= speed;
            if (keys['s']) posY += speed;
            if (keys['a']) posX -= speed;
            if (keys['d']) posX += speed;

            // Move o mapa, não o jogador (Efeito de câmera)
            world.style.transform = `translate(${-posX + window.innerWidth/2}px, ${-posY + window.innerHeight/2}px)`;
            requestAnimationFrame(update);
        }
        update();

        // Ciclo de Tempo
        setInterval(() => {
            gameMinutes += 1;
            let h = Math.floor(gameMinutes / 60) % 24;
            let m = gameMinutes % 60;
            clockEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            
            // Escurece gradualmente
            if (h >= 19 || h < 5) nightOverlay.style.opacity = 0.5;
            else if (h >= 17) nightOverlay.style.opacity = 0.2;
            else nightOverlay.style.opacity = 0;
        }, 1000);

        // Seleção de itens
        slots.forEach(s => s.onclick = () => {
            slots.forEach(x => x.classList.remove('active'));
            s.classList.add('active');
            selectedTool = s.dataset.tool;
        });
    </script>
</body>
</html>
