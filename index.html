<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pixel Farm: Harvest & Animals</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="world">
            <div id="ground"></div>
            <div id="entities">
                <div id="player" class="entity">
                    <div class="p-sprite"></div>
                </div>
                <div id="cow" class="entity animal" onclick="interactAnimal()">
                    <div class="cow-body"></div>
                    <span class="bubble">🐮 Moo!</span>
                </div>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="stats">
            <div class="stat-item">💰 <span id="money">0</span></div>
            <div class="stat-item">🥛 <span id="milk">0</span></div>
            <div class="stat-item">🌽 <span id="crops">0</span></div>
        </div>
        <div class="hotbar">
            <div class="slot active" data-tool="hoe">⛏️<small>Enxada</small></div>
            <div class="slot" data-tool="seed">🌱<small>Semente</small></div>
            <div class="slot" data-tool="water">💧<small>Regar</small></div>
            <div class="slot" data-tool="hand">✋<small>Colher</small></div>
        </div>
        <div id="msg">Use WASD para andar e clique para interagir!</div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const ground = document.getElementById('ground');
        
        let pX = 400, pY = 400;
        let resources = { money: 0, milk: 0, crops: 0 };
        let selectedTool = 'hoe';

        // 1. Gerar o Mapa Detalhado
        for (let i = 0; i < 400; i++) {
            const x = (i % 20) * 80;
            const y = Math.floor(i / 20) * 80;
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.left = x + 'px';
            tile.style.top = y + 'px';
            tile.dataset.state = 'grass'; // grass, plowed, watered, seeded, ready
            
            tile.onclick = () => handleTileClick(tile);
            ground.appendChild(tile);
        }

        function handleTileClick(tile) {
            const state = tile.dataset.state;

            if (selectedTool === 'hoe' && state === 'grass') {
                tile.dataset.state = 'plowed';
                tile.className = 'tile plowed';
            } 
            else if (selectedTool === 'seed' && state === 'plowed') {
                tile.dataset.state = 'seeded';
                tile.innerHTML = '<div class="crop stage-1"></div>';
                startGrowth(tile);
            } 
            else if (selectedTool === 'water' && (state === 'plowed' || state === 'seeded')) {
                tile.classList.add('wet');
            } 
            else if (selectedTool === 'hand' && state === 'ready') {
                resources.crops++;
                updateUI();
                tile.dataset.state = 'plowed';
                tile.className = 'tile plowed';
                tile.innerHTML = '';
            }
        }

        function startGrowth(tile) {
            setTimeout(() => {
                if(tile.classList.contains('wet')) {
                    const crop = tile.querySelector('.crop');
                    crop.className = 'crop stage-2';
                    tile.classList.remove('wet');
                    setTimeout(() => {
                        crop.className = 'crop stage-3';
                        tile.dataset.state = 'ready';
                    }, 5000);
                }
            }, 5000);
        }

        function interactAnimal() {
            resources.milk++;
            updateUI();
            const bubble = document.querySelector('.bubble');
            bubble.innerText = "❤️ +1 Leite!";
            setTimeout(() => bubble.innerText = "🐮 Moo!", 2000);
        }

        function updateUI() {
            document.getElementById('money').innerText = resources.money;
            document.getElementById('milk').innerText = resources.milk;
            document.getElementById('crops').innerText = resources.crops;
        }

        // 2. Movimentação e Câmera
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function loop() {
            if (keys['w']) pY -= 4;
            if (keys['s']) pY += 4;
            if (keys['a']) pX -= 4;
            if (keys['d']) pX += 4;

            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            player.style.zIndex = Math.floor(pY);

            world.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;
            requestAnimationFrame(loop);
        }

        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                selectedTool = s.dataset.tool;
            };
        });

        loop();
    </script>
</body>
</html>
