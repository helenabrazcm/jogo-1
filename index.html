<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo JS - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stats">PLAYER 1<span id="p1-score">0</span></div>
            <div class="stats" style="text-align: center;">STAGE<span id="level">1</span></div>
            <div class="stats" style="text-align: right; border-left: none; border-right: 4px solid #00f2ff;">PLAYER 2<span id="p2-score">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="msg-overlay">
            <h1 id="title">TURBO JS</h1>
            <p class="controls-hint">P1: W,A,S,D | P2: SETAS</p>
            <p id="sub-msg">AGUARDANDO CARREGAMENTO...</p>
            <button id="start-btn" onclick="startGame()" style="display: none;">START RACE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
