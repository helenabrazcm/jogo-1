<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="night-overlay"></div>
        
        <div id="minimap-container">
            <div id="minimap">
                <div id="minimap-player"></div>
            </div>
        </div>

        <div id="world">
            <div class="plot" style="top: 400px; left: 400px;">🟫</div>
            <div class="plot" style="top: 400px; left: 460px;">🟫</div>
            <div class="plot" style="top: 460px; left: 400px;">🟫</div>
            <div class="plot" style="top: 460px; left: 460px;">🟫</div>
            <div id="player">🧑‍🌾</div>
        </div>

        <div id="hud">
            <div class="info">💰 Ouro: <span id="ui-gold">0</span></div>
            <div id="quest">Colha trigos (<span id="q-count">0</span>/3)</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
