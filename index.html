<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stardew Ultra Realistic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="world">
            <div id="ground"></div>
            <div id="entities">
                <div id="player"></div>
            </div>
        </div>
        <div id="vignette"></div> </div>

    <div id="ui">
        <div class="hotbar">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="water">💧</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const ground = document.getElementById('ground');
        
        let pX = 800, pY = 800;
        let frame = 0;
        let direction = 0; // 0: Down, 1: Left, 2: Right, 3: Up
        let isMoving = false;
        let lastTime = 0;

        // Criar o chão detalhado
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.onclick = () => {
                tile.classList.add('plowed');
                createDust(pX, pY);
            };
            ground.appendChild(tile);
        }

        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function createDust(x, y) {
            const dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.left = x + 'px';
            dust.style.top = y + 'px';
            document.getElementById('entities').appendChild(dust);
            setTimeout(() => dust.remove(), 500);
        }

        function gameLoop(timestamp) {
            isMoving = false;
            const speed = 3.5;

            if (keys['w']) { pY -= speed; direction = 3; isMoving = true; }
            if (keys['s']) { pY += speed; direction = 0; isMoving = true; }
            if (keys['a']) { pX -= speed; direction = 1; isMoving = true; }
            if (keys['d']) { pX += speed; direction = 2; isMoving = true; }

            // Animação de Sprite baseada no tempo
            if (isMoving) {
                if (timestamp - lastTime > 120) {
                    frame = (frame + 1) % 4; // Assume 4 frames de animação por linha
                    lastTime = timestamp;
                }
            } else {
                frame = 0;
            }

            // Cálculo do Sprite Sheet (Ajustado para o link enviado)
            // Cada frame tem aprox 48px a 64px na imagem original
            const spriteW = 64; 
            const spriteH = 64;
            player.style.backgroundPosition = `-${frame * spriteW}px -${direction * spriteH}px`;
            
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            player.style.zIndex = Math.floor(pY);

            // Câmera Suave
            const camX = -pX + window.innerWidth / 2;
            const camY = -pY + window.innerHeight / 2;
            world.style.transform = `translate(${camX}px, ${camY}px)`;

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
