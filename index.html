<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stardew Clone - Mapa Fixo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="viewport">
        <div id="world">
            </div>
        <div id="player">
            <div class="p-hair"></div>
            <div class="p-body"></div>
        </div>
    </div>

    <div id="ui">
        <div class="status">
            <div id="clock">06:00 AM</div>
            <div class="energy-slot"><div id="energy-bar"></div></div>
        </div>
        <div class="hotbar">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="axe">🪓</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const energyBar = document.getElementById('energy-bar');
        
        // Configurações do Mundo
        const tileSize = 80;
        const mapSize = 20; // 20x20 tiles
        let pX = 800, pY = 800; // Começa no meio do mapa (20*80 / 2)
        let energy = 100;

        // Gerar o Chão Corretamente
        for (let i = 0; i < mapSize * mapSize; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            // Adicionar árvores aleatórias para teste de visão
            if (Math.random() > 0.9) {
                const tree = document.createElement('div');
                tree.className = 'tree';
                tile.appendChild(tree);
            }

            tile.onclick = () => {
                const tool = document.querySelector('.slot.active').dataset.tool;
                if (tool === 'hoe') tile.classList.add('plowed');
                if (tool === 'axe' && tile.querySelector('.tree')) {
                    tile.querySelector('.tree').remove();
                }
                energy -= 5;
                energyBar.style.width = energy + '%';
            };
            world.appendChild(tile);
        }

        // Movimentação
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function update() {
            const speed = 5;
            if (keys['w']) pY -= speed;
            if (keys['s']) pY += speed;
            if (keys['a']) pX -= speed;
            if (keys['d']) pX += speed;

            // Posiciona o jogador no mundo
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            // MOVE A CÂMERA (Viewport)
            // Isso centraliza o jogador na tela
            const camX = -pX + window.innerWidth / 2;
            const camY = -pY + window.innerHeight / 2;
            world.parentElement.style.transform = `translate(${camX}px, ${camY}px)`;

            requestAnimationFrame(update);
        }
        update();

        // Seleção de ferramentas
        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
            };
        });
    </script>
</body>
</html>
