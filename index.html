<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pixel Farm Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="world">
            <div id="ground"></div>
            <div id="entities"></div>
        </div>
    </div>

    <div id="ui">
        <div class="stats">
            <div id="clock">06:00 AM</div>
            <div class="bar-container"><div id="energy-bar"></div></div>
            <div id="money">G$ 100</div>
        </div>
        <div class="inventory">
            <div class="slot active" data-tool="hoe" title="Enxada">⛏️</div>
            <div class="slot" data-tool="seed" title="Sementes">🌱</div>
            <div class="slot" data-tool="water" title="Regador">💧</div>
            <div class="slot" data-tool="axe" title="Machado">🪓</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const entities = document.getElementById('entities');
        const energyBar = document.getElementById('energy-bar');
        
        let pX = 400, pY = 400;
        let energy = 100;
        let money = 100;
        let selectedTool = 'hoe';
        let frame = 0;
        let direction = 0; // 0: Down, 1: Up, 2: Left, 3: Right
        let isMoving = false;

        // Criar Personagem
        const player = document.createElement('div');
        player.id = 'player';
        // Link da imagem que você enviou (com correção de exibição)
        player.style.backgroundImage = "url('https://i.pinimg.com/1200x/7b/bf/ee/7bbfee1f9ef36762eb90e7805077060c.jpg')";
        entities.appendChild(player);

        // Gerar Mapa
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.left = (i % 20) * 80 + 'px';
            tile.style.top = Math.floor(i / 20) * 80 + 'px';
            
            tile.onclick = () => {
                if(energy <= 0) return;
                if(selectedTool === 'hoe') {
                    tile.classList.add('plowed');
                    updateEnergy(-5);
                } else if(selectedTool === 'seed' && tile.classList.contains('plowed')) {
                    tile.innerHTML = '<div class="crop"></div>';
                    updateEnergy(-2);
                }
            };
            document.getElementById('ground').appendChild(tile);
        }

        function updateEnergy(v) {
            energy = Math.max(0, energy + v);
            energyBar.style.width = energy + "%";
        }

        // Movimentação e Animação
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function gameLoop() {
            isMoving = false;
            if (keys['w']) { pY -= 4; direction = 1; isMoving = true; }
            if (keys['s']) { pY += 4; direction = 0; isMoving = true; }
            if (keys['a']) { pX -= 4; direction = 2; isMoving = true; }
            if (keys['d']) { pX += 4; direction = 3; isMoving = true; }

            if (isMoving) {
                frame = (Math.floor(Date.now() / 150) % 4);
            } else {
                frame = 0;
            }

            // Ajuste do Sprite Sheet (32x32 ou 48x48 dependendo da imagem)
            // Esses valores cortam o fundo e mostram apenas o boneco
            const spriteSize = 48; 
            player.style.backgroundPosition = `-${frame * spriteSize}px -${direction * spriteSize}px`;
            
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            player.style.zIndex = Math.floor(pY);

            world.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;
            requestAnimationFrame(gameLoop);
        }

        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                selectedTool = s.dataset.tool;
            };
        });

        gameLoop();
    </script>
</body>
</html>
