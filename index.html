<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão RPG - Farm Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="overlay-screen">
        <h1>SERTÃO RPG</h1>
        <button onclick="showCustomization()">NOVO JOGO</button>
        <button onclick="loadGame()">CARREGAR JOGO</button>
    </div>

    <div id="custom-screen" class="overlay-screen" style="display:none;">
        <h2>Crie seu Fazendeiro</h2>
        <input type="text" id="char-name" placeholder="Nome do Personagem">
        <div class="char-options">
            <button onclick="setSkin('🧑‍🌾')">Visual A</button>
            <button onclick="setSkin('👩‍🌾')">Visual B</button>
            <button onclick="setSkin('👨‍🌾')">Visual C</button>
        </div>
        <div id="preview">🧑‍🌾</div>
        <button onclick="startGame()">COMEÇAR AVENTURA</button>
    </div>

    <div id="game-container" style="display:none;">
        <div id="night-overlay"></div>
        <div id="player"></div>

        <div id="minimap">
         <div id="minimap-player"></div>
         <div class="minimap-dot" style="top:20%; left:20%; background: #8b4513;"></div> <div class="minimap-dot" style="top:70%; left:80%; background: #ffeb3b;"></div> </div>

         <div id="world">
         <div id="farm-area" class="zone">FAZENDA</div>
         <div id="shop-npc" class="npc" style="top: 1200px; left: 1500px;" onclick="toggleInventory()">🏪 LOJA (Clique)</div>
        </div>
        
        <div class="plot" style="top: 200px; left: 200px;" onclick="interactPlot(this)">🟫</div>
        <div class="plot" style="top: 200px; left: 260px;" onclick="interactPlot(this)">🟫</div>
        <div class="animal" style="top: 400px; left: 600px;" onclick="collectAnimal('🐄')">🐄</div>
        
        <div id="ui-layer">
            <div id="stats">
                <span id="display-name">Nome</span> | 💰 <span id="gold-val">0</span> | ⭐ XP: <span id="xp-val">0</span>
            </div>
            <div id="clock">08:00</div>
        </div>

        <div id="quest-log">
            <b>📜 Missões</b>
            <div id="quest-list">Colha 1 Trigo</div>
        </div>
    </div>

    <div id="inventory-menu" class="modal">
        <h3>🎒 Inventário & Loja</h3>
        <div class="tabs">
            <div id="inv-content"></div>
            <hr>
            <h4>🛒 Comprar Sementes (10 Gold)</h4>
            <button onclick="buySeed()">Comprar Semente de Trigo</button>
        </div>
        <button onclick="sellAll()" style="background:gold">VENDER PRODUTOS</button>
        <p><small>Pressione 'E' para fechar</small></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
