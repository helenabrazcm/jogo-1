<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Farm: Deluxe Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-viewport">
        <div id="world">
            <div id="ground"></div>
            <div id="entities">
                <div id="player">
                    <div class="p-hair"></div>
                    <div class="p-face"><div class="eye l"></div><div class="eye r"></div></div>
                    <div class="p-body"></div>
                </div>
                <div id="cow" onclick="collectMilk()">
                    <div class="cow-head"></div>
                    <div class="cow-spots"></div>
                    <div class="cow-ears"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="inventory">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="water">💧</div>
            <div class="slot" data-tool="hand">✋</div>
        </div>
        <div class="counters">
            <span>🥛 <b id="c-milk">0</b></span>
            <span>🌽 <b id="c-crops">0</b></span>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const ground = document.getElementById('ground');
        const player = document.getElementById('player');
        
        let pX = 400, pY = 400;
        let selectedTool = 'hoe';
        let milk = 0, crops = 0;

        // Gerar o chão com detalhes
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.left = (i % 20) * 80 + 'px';
            tile.style.top = Math.floor(i / 20) * 80 + 'px';
            tile.dataset.state = 'grass';
            tile.onclick = () => interactTile(tile);
            ground.appendChild(tile);
        }

        function interactTile(tile) {
            if (selectedTool === 'hoe' && tile.dataset.state === 'grass') {
                tile.dataset.state = 'plowed';
                tile.classList.add('plowed');
            } else if (selectedTool === 'seed' && tile.dataset.state === 'plowed') {
                tile.dataset.state = 'seeded';
                tile.innerHTML = '<div class="plant stage1"></div>';
            } else if (selectedTool === 'water' && tile.dataset.state === 'seeded') {
                tile.classList.add('wet');
                setTimeout(() => grow(tile), 3000);
            } else if (selectedTool === 'hand' && tile.dataset.state === 'ready') {
                crops++;
                document.getElementById('c-crops').innerText = crops;
                tile.dataset.state = 'plowed';
                tile.innerHTML = '';
            }
        }

        function grow(tile) {
            const p = tile.querySelector('.plant');
            if (p) {
                p.className = 'plant stage2';
                setTimeout(() => { 
                    p.className = 'plant stage3'; 
                    tile.dataset.state = 'ready';
                }, 3000);
            }
        }

        function collectMilk() {
            milk++;
            document.getElementById('c-milk').innerText = milk;
            const cow = document.getElementById('cow');
            cow.style.transform = "scale(1.1)";
            setTimeout(() => cow.style.transform = "scale(1)", 200);
        }

        // Movimentação
        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function loop() {
            if (keys['w']) pY -= 5; if (keys['s']) pY += 5;
            if (keys['a']) pX -= 5; if (keys['d']) pX += 5;
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            world.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;
            requestAnimationFrame(loop);
        }

        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                selectedTool = s.dataset.tool;
            };
        });

        loop();
    </script>
</body>
</html>
