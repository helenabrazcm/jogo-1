<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div class="plot" style="top: 1400px; left: 1400px;">🟫</div>
            <div class="plot" style="top: 1400px; left: 1480px;">🟫</div>
            <div class="plot" style="top: 1480px; left: 1400px;">🟫</div>
            <div class="plot" style="top: 1480px; left: 1480px;">🟫</div>

            <div id="player">
                <div class="character-body">
                    <div class="hat"></div>
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
            </div>
        </div>

        <div id="hud">
            <div class="status-card">
                <div class="info">💰 Ouro: <span id="ui-gold">0</span></div>
                <div class="inventory">
                    <div class="slot">🌾 Trigo: <span id="ui-wheat">0</span></div>
                </div>
            </div>
            <div id="quest">Use WASD para andar | Clique perto da terra para cultivar</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
