<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Fazendinha Pixel</title>
    <style>
        /* ESTILOS VISUAIS */
        :root {
            --grass: #78ab46;
            --dirt: #6d4c41;
            --ui-bg: #fdf5e6;
            --brown: #5d4037;
        }

        body { margin: 0; overflow: hidden; background: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        #viewport { width: 100vw; height: 100vh; position: relative; cursor: crosshair; }

        #world { position: absolute; width: 2000px; height: 2000px; background: var(--grass);
            background-image: radial-gradient(rgba(0,0,0,0.05) 10%, transparent 10%);
            background-size: 30px 30px;
        }

        /* O PERSONAGEM */
        #player {
            position: absolute; width: 40px; height: 50px; z-index: 100;
            transition: transform 0.1s;
        }
        .p-body { width: 100%; height: 100%; background: #3498db; border-radius: 8px; position: relative; border-bottom: 6px solid #2c3e50; }
        .p-head { width: 34px; height: 30px; background: #ffdbac; border-radius: 10px; position: absolute; top: -20px; left: 3px; border: 2px solid var(--brown); }
        .p-eye { width: 4px; height: 4px; background: #333; position: absolute; top: 12px; border-radius: 50%; }
        .p-eye.l { left: 8px; } .p-eye.r { right: 18px; }

        /* A VACA */
        .cow {
            position: absolute; width: 80px; height: 60px; background: white;
            border-radius: 20px; border: 4px solid #ddd; cursor: pointer;
            background-image: radial-gradient(#333 30%, transparent 31%);
            background-size: 40px 40px;
        }
        .cow::before { content: ""; position: absolute; width: 30px; height: 30px; background: white; left: -20px; top: 5px; border-radius: 10px; border: 4px solid #ddd; }

        /* TILES E PLANTAS */
        .tile { position: absolute; width: 80px; height: 80px; border: 1px solid rgba(0,0,0,0.02); }
        .plowed { background: var(--dirt) !important; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .wet { background: #3e2723 !important; }

        .plant { width: 30px; margin: 0 auto; position: relative; top: 20px; transition: 0.5s; }
        .stage1 { height: 10px; background: #aed581; border-radius: 5px; }
        .stage2 { height: 30px; background: #8bc34a; border-radius: 10px 10px 0 0; }
        .stage3 { height: 50px; background: #f1c40f; border: 3px solid #e67e22; border-radius: 15px 15px 0 0; }

        /* INTERFACE */
        #ui { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        .hotbar { display: flex; background: var(--ui-bg); padding: 10px; border: 4px solid var(--brown); border-radius: 15px; pointer-events: all; gap: 10px; }
        .slot { width: 60px; height: 60px; background: white; border: 2px solid #bcaaa4; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; }
        .slot.active { border: 4px solid #f1c40f; transform: translateY(-10px); background: #fffde7; }
        
        #hud { position: fixed; top: 20px; left: 20px; background: var(--ui-bg); border: 4px solid var(--brown); padding: 10px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">💰 Moedas: <span id="money">0</span> | 🥛 Leite: <span id="milk">0</span></div>

    <div id="viewport">
        <div id="world">
            <div id="grid"></div>
            <div id="player">
                <div class="p-head"><div class="p-eye l"></div><div class="p-eye r"></div></div>
                <div class="p-body"></div>
            </div>
            <div class="cow" style="left: 600px; top: 400px;" onclick="milking()"></div>
        </div>
    </div>

    <div id="ui">
        <div class="hotbar">
            <div class="slot active" data-tool="hoe" onclick="setTool('hoe', this)">⛏️</div>
            <div class="slot" data-tool="seed" onclick="setTool('seed', this)">🌱</div>
            <div class="slot" data-tool="water" onclick="setTool('water', this)">💧</div>
            <div class="slot" data-tool="harvest" onclick="setTool('harvest', this)">✋</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const grid = document.getElementById('grid');
        const player = document.getElementById('player');
        
        let pX = 500, pY = 500;
        let tool = 'hoe';
        let money = 0, milk = 0;

        // 1. Criar o Chão
        for (let i = 0; i < 400; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.style.left = (i % 20) * 80 + 'px';
            tile.style.top = Math.floor(i / 20) * 80 + 'px';
            tile.dataset.state = 'grass';
            
            tile.onclick = () => {
                if (tool === 'hoe' && tile.dataset.state === 'grass') {
                    tile.dataset.state = 'plowed';
                    tile.classList.add('plowed');
                } else if (tool === 'seed' && tile.dataset.state === 'plowed') {
                    tile.dataset.state = 'seeded';
                    tile.innerHTML = '<div class="plant stage1"></div>';
                } else if (tool === 'water' && tile.dataset.state === 'seeded') {
                    tile.classList.add('wet');
                    setTimeout(() => {
                        const p = tile.querySelector('.plant');
                        if(p) p.className = 'plant stage2';
                        tile.classList.remove('wet');
                        setTimeout(() => {
                            if(p) p.className = 'plant stage3';
                            tile.dataset.state = 'ready';
                        }, 3000);
                    }, 3000);
                } else if (tool === 'harvest' && tile.dataset.state === 'ready') {
                    money += 20;
                    tile.innerHTML = '';
                    tile.dataset.state = 'plowed';
                    document.getElementById('money').innerText = money;
                }
            };
            grid.appendChild(tile);
        }

        // 2. Movimentação
        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function update() {
            if (keys['w']) pY -= 5; if (keys['s']) pY += 5;
            if (keys['a']) pX -= 5; if (keys['d']) pX += 5;

            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            // Câmera segue o jogador
            const camX = -pX + window.innerWidth / 2;
            const camY = -pY + window.innerHeight / 2;
            world.style.transform = `translate(${camX}px, ${camY}px)`;

            requestAnimationFrame(update);
        }

        function setTool(t, el) {
            tool = t;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function milking() {
            milk++;
            document.getElementById('milk').innerText = milk;
            alert("Você pegou leite da vaquinha! 🐮🥛");
        }

        update();
    </script>
</body>
</html>
