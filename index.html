<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="hud-top">
            <div class="stat">💰 <span id="ui-gold">50</span></div>
            <div class="stat">🎒 <span id="ui-inv">Vazio</span></div>
        </div>

        <div id="quest-log">
            <b>📜 Missão:</b>
            <p id="quest-text">Use WASD para andar!</p>
        </div>

        <div id="world-container">
            <div id="world">
                <div class="plot" style="top: 500px; left: 500px;">🟫</div>
                <div class="plot" style="top: 500px; left: 560px;">🟫</div>
                
                <div id="npc-ze" class="npc" style="top: 1000px; left: 1000px;">
                    <div class="speech-bubble">Chega mais!</div>
                    👨‍🌾 <span>Zé</span>
                </div>

                <div id="player">🧑‍🌾</div>
            </div>
        </div>

        <div id="minimap-container">
            <div id="minimap"><div id="minimap-player"></div></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
