<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG - Instant Start</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="night-overlay"></div>
        
        <div id="minimap-container">
            <div id="minimap">
                <div id="minimap-player"></div>
            </div>
        </div>

        <div id="world">
            <div class="plot" style="top: 500px; left: 500px;">🟫</div>
            <div class="plot" style="top: 500px; left: 560px;">🟫</div>
            <div class="plot" style="top: 560px; left: 500px;">🟫</div>
            <div class="plot" style="top: 560px; left: 560px;">🟫</div>
            
            <div class="npc-store" style="top: 2000px; left: 2000px;">🏪 MERCADO</div>

            <div id="player">🧑‍🌾</div>
        </div>

        <div id="hud">
            <div class="stat-box">
                💰 Ouro: <span id="ui-gold">0</span>
            </div>
            <div id="mission-box">
                Colha 3 trigos (<span id="ui-quest-count">0</span>/3)
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
