<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pixel Farm Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="day-night-filter"></div>

    <div id="hud">
        <div class="stats-box">
            💰 <span id="m-gold">100</span> | ⭐ Nível <span id="m-lvl">1</span>
            <div id="clock">06:00 AM</div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>🏆 Top Fazendeiros</h3>
        <ol id="rank-list">
            <li>👑 Você: <span id="rank-gold">100</span></li>
            <li>Player2: 2500</li>
            <li>Player3: 1800</li>
        </ol>
    </div>

    <div id="viewport">
        <div id="world">
            <div id="grid"></div>
            
            <div class="npc" id="npc-shop" onclick="talk('João: Quer comprar sementes?')"></div>

            <div id="player"></div>
        </div>
    </div>

    <div id="inventory-overlay" class="hidden">
        <div class="inventory-window">
            <h2>🎒 Mochila de Itens</h2>
            <div class="inv-grid">
                <div class="inv-slot">🌽 Milho: <span id="inv-corn">0</span></div>
                <div class="inv-slot">🥛 Leite: <span id="inv-milk">0</span></div>
                <div class="inv-slot">🥚 Ovos: <span id="inv-eggs">0</span></div>
            </div>
            <p><small>Pressione [E] para sair</small></p>
        </div>
    </div>

    <div id="ui-container">
        <div class="hotbar">
            <div class="slot active" data-tool="hoe" onclick="setTool('hoe', this)">⛏️</div>
            <div class="slot" data-tool="seed" onclick="setTool('seed', this)">🌱</div>
            <div class="slot" data-tool="water" onclick="setTool('water', this)">💧</div>
            <div class="slot" data-tool="fence" onclick="setTool('fence', this)">🚧</div>
            <div class="slot" data-tool="hand" onclick="setTool('hand', this)">✋</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
