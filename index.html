<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão RPG - Fazenda Expandida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="overlay-screen">
        <div class="menu-card">
            <h1>🌾 SERTÃO RPG</h1>
            <p>O simulador de fazenda definitivo</p>
            <div class="menu-buttons">
                <button id="btn-new-game" class="btn-main">NOVO JOGO</button>
                <button id="btn-load-game" class="btn-secondary">CARREGAR JOGO</button>
            </div>
        </div>
    </div>

    <div id="custom-screen" class="overlay-screen" style="display:none;">
        <div class="menu-card">
            <h2>Crie seu Fazendeiro</h2>
            <input type="text" id="char-name" placeholder="Nome do Personagem" maxlength="12">
            
            <div class="char-selection">
                <button class="skin-btn" data-skin="🧑‍🌾">Visual A</button>
                <button class="skin-btn" data-skin="👩‍🌾">Visual B</button>
                <button class="skin-btn" data-skin="👨‍🌾">Visual C</button>
            </div>
            
            <div id="preview-box">
                <span id="preview-emoji">🧑‍🌾</span>
            </div>

            <button id="btn-start-adventure" class="btn-main">COMEÇAR AVENTURA</button>
        </div>
    </div>

    <div id="game-container" style="display:none;">
        <div id="night-overlay"></div>
        
        <div id="minimap-container">
            <div id="minimap">
                <div id="minimap-player"></div>
                <div class="map-dot" style="top:15%; left:15%; background: #8b4513;"></div>
                <div class="map-dot" style="top:80%; left:80%; background: #ffeb3b;"></div>
            </div>
        </div>

        <div id="world">
            <div class="plot" style="top: 400px; left: 400px;">🟫</div>
            <div class="plot" style="top: 400px; left: 460px;">🟫</div>
            <div class="plot" style="top: 460px; left: 400px;">🟫</div>
            <div class="plot" style="top: 460px; left: 460px;">🟫</div>

            <div class="npc-shop" style="top: 2400px; left: 2400px;">
                <span>🏪 MERCADO</span><br>
                <small>Clique para abrir Loja</small>
            </div>

            <div id="player">🧑‍🌾</div>
        </div>

        <div id="ui-top">
            <div class="stat-card">
                <b id="display-name">Nome</b><br>
                💰 <span id="gold-val">0</span> | ⭐ <span id="xp-val">0</span>
            </div>
            <div id="clock">08:00</div>
        </div>

        <div id="quest-log">
            <b>📜 MISSÃO ATUAL</b>
            <div id="quest-text">Colha 3 trigos (0/3)</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
