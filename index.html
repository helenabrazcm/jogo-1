<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stardew Clone - Fixed Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="camera">
        <div id="world">
            </div>
        <div id="player">
            <div class="p-hair"></div>
            <div class="p-body"></div>
            <div class="p-legs"></div>
        </div>
    </div>

    <div id="ui">
        <div class="stats">
            <div id="clock">06:00 AM</div>
            <div class="energy-container"><div id="energy-bar"></div></div>
        </div>
        <div class="hotbar">
            <div class="slot active" data-tool="hoe">⛏️</div>
            <div class="slot" data-tool="seed">🌱</div>
            <div class="slot" data-tool="axe">🪓</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const energyBar = document.getElementById('energy-bar');
        
        let pX = 500, pY = 500; // Posição inicial no centro
        let energy = 100;
        let selectedTool = 'hoe';

        // 1. Gerar o Mapa (Grid de 20x20 para performance)
        const size = 20;
        const tileSize = 80;

        for (let i = 0; i < size * size; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            // Adicionar obstáculos aleatórios
            if (Math.random() > 0.9) {
                const tree = document.createElement('div');
                tree.className = 'tree';
                tile.appendChild(tree);
            }

            tile.onclick = () => {
                if (energy <= 0) return;
                if (selectedTool === 'hoe') {
                    tile.classList.add('plowed');
                    updateEnergy(-5);
                }
                if (selectedTool === 'axe' && tile.querySelector('.tree')) {
                    tile.querySelector('.tree').remove();
                    updateEnergy(-10);
                }
            };
            world.appendChild(tile);
        }

        function updateEnergy(val) {
            energy = Math.max(0, energy + val);
            energyBar.style.width = energy + '%';
        }

        // 2. Movimentação e Câmera
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function gameLoop() {
            const speed = 4;
            if (keys['w']) pY -= speed;
            if (keys['s']) pY += speed;
            if (keys['a']) pX -= speed;
            if (keys['d']) pX += speed;

            // Atualiza posição do jogador
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            // Câmera: move o "world" no sentido oposto para manter o player no centro
            world.parentElement.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;

            requestAnimationFrame(gameLoop);
        }

        // Troca de ferramenta
        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                selectedTool = s.dataset.tool;
            };
        });

        gameLoop();
    </script>
</body>
</html>
