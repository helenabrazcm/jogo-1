<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew JS: Expanded Farm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
    💰 Ouro: <span id="m-gold">100</span> | 
    📦 Cesta: <span id="m-basket">0</span> itens
</div>

<div id="viewport">
    <div id="world">
        <div id="grid"></div>
        
        <div id="shipping-bin">VENDER (Clique)</div>
        
        <div id="player">
            <div class="p-skin">
                <div class="eye" style="left:5px"></div>
                <div class="eye" style="left:18px"></div>
            </div>
            <div class="p-shirt"></div>
        </div>
        
        <div class="animal cow" style="left:600px; top:400px" onclick="collect(this)"></div>
        <div class="animal cow" style="left:750px; top:350px" onclick="collect(this)"></div>
        <div class="animal chicken" style="left:500px; top:600px" onclick="collect(this)"></div>
        <div class="animal chicken" style="left:550px; top:650px" onclick="collect(this)"></div>
    </div>
</div>

<div id="ui">
    <div class="hotbar">
        <div class="slot active" data-tool="hoe" onclick="setTool('hoe', this)">⛏️</div>
        <div class="slot" data-tool="seed" onclick="setTool('seed', this)">🌱</div>
        <div class="slot" data-tool="water" onclick="setTool('water', this)">💧</div>
        <div class="slot" data-tool="hand" onclick="setTool('hand', this)">✋</div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const player = document.getElementById('player');
    const grid = document.getElementById('grid');
    
    let pX = 850, pY = 650;
    let tool = 'hoe';
    let gold = 100;
    let basket = 0;

    // Gerar Chão (Grid de 20x20)
    for (let i = 0; i < 400; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.left = (i % 20) * 80 + 'px';
        tile.style.top = Math.floor(i / 20) * 80 + 'px';
        tile.dataset.state = 'grass';
        
        tile.onclick = () => {
            if (tool === 'hoe' && tile.dataset.state === 'grass') {
                tile.dataset.state = 'plowed';
                tile.classList.add('plowed');
            } else if (tool === 'seed' && tile.dataset.state === 'plowed') {
                tile.dataset.state = 'seeded';
                tile.innerHTML = '<div class="plant" style="height:10px; background:#aed581; border-radius:5px;"></div>';
            } else if (tool === 'water' && tile.dataset.state === 'seeded') {
                tile.classList.add('wet');
                setTimeout(() => {
                    tile.innerHTML = '<div class="plant stage3"></div>';
                    tile.dataset.state = 'ready';
                    tile.classList.remove('wet');
                }, 3000);
            } else if (tool === 'hand' && tile.dataset.state === 'ready') {
                basket++;
                tile.innerHTML = '';
                tile.dataset.state = 'plowed';
                updateUI();
            }
        };
        grid.appendChild(tile);
    }

    // Lógica da Caixa de Venda
    document.getElementById('shipping-bin').onclick = () => {
        if (basket > 0) {
            gold += basket * 50;
            alert(`Venda realizada! +${basket * 50} ouros 💰`);
            basket = 0;
            updateUI();
        } else {
            alert("Sua cesta está vazia!");
        }
    };

    function collect(el) {
        el.style.transform = "scale(1.3)";
        setTimeout(() => el.style.transform = "scale(1)", 200);
        basket++;
        updateUI();
    }

    function setTool(t, el) {
        tool = t;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
    }

    function updateUI() {
        document.getElementById('m-gold').innerText = gold;
        document.getElementById('m-basket').innerText = basket;
    }

    // Controles de Movimento
    const keys = {};
    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;

    function loop() {
        if (keys['w']) pY -= 5; if (keys['s']) pY += 5;
        if (keys['a']) pX -= 5; if (keys['d']) pX += 5;
        
        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        
        // Câmera dinâmica
        world.style.transform = `translate(${-pX + window.innerWidth/2}px, ${-pY + window.innerHeight/2}px)`;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
