<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Turismo JS - 5 Fases</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(255,255,255,0.1);
            border: 10px solid #222;
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #fff;
            z-index: 10;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .stats {
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 5px;
            border-bottom: 3px solid #ff0000;
        }

        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.95);
            padding: 50px;
            border-radius: 5px;
            border: 1px solid #444;
            z-index: 20;
        }

        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #b30000; }
        canvas { display: block; }
        span { color: #ff0000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stats">FASE: <span id="level">1</span>/5</div>
            <div class="stats">P1: <span id="p1-score">0</span>km</div>
            <div class="stats">P2: <span id="p2-score">0</span>km</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

       <div id="msg-overlay">
            <h1 id="title">SPEED MASTERS</h1>
            <p>P1: W,A,S,D | P2: SETAS</p>
            <p id="sub-msg">Vença as 5 etapas da competição!</p>
            <button id="start-btn" onclick="startGame()">INICIAR CORRIDA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgOverlay = document.getElementById('msg-overlay');

        canvas.width = 800;
        canvas.height = window.innerHeight * 0.95;

        let gameActive = false;
        let level = 1;
        let roadOffset = 0;
        let speed = 8;
        const keys = {};

        const themes = [
            { grass: "#2d5a27", road: "#333" },
            { grass: "#c2b280", road: "#444" },
            { grass: "#1e3d59", road: "#222" },
            { grass: "#a8dadc", road: "#3d405b"},
            { grass: "#457b9d", road: "#1d3557"}
        ];

        const car1Img = new Image();
        car1Img.src = 'https://i.imgur.com/vH0HhU9.png';
        const car2Img = new Image();
        car2Img.src = 'https://i.imgur.com/Bf0NnO5.png';

        const p1 = { x: 150, y: canvas.height - 220, w: 100, h: 180, score: 0, tilt: 0 };
        const p2 = { x: 550, y: canvas.height - 220, w: 100, h: 180, score: 0, tilt: 0 };

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // Também permite iniciar com a tecla ESPAÇO
            if (e.code === 'Space' && !gameActive) startGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // FUNÇÃO DE INÍCIO CORRIGIDA
        function startGame() {
            if (gameActive) return; // Evita iniciar múltiplos loops
            gameActive = true;
            msgOverlay.style.visibility = 'hidden'; // Usa visibility para garantir que suma
            msgOverlay.style.opacity = '0';
            update();
        }

        function update() {
            if (!gameActive) return;

            let moveSpeed = 7 + (level * 1);

            if (keys['KeyW'] && p1.y > 20) p1.y -= moveSpeed;
            if (keys['KeyS'] && p1.y < canvas.height - 190) p1.y += moveSpeed;
            if (keys['KeyA'] && p1.x > 60) { p1.x -= moveSpeed; p1.tilt = -0.04; }
            if (keys['KeyD'] && p1.x < canvas.width/2 - 110) { p1.x += moveSpeed; p1.tilt = 0.04; }

            if (keys['ArrowUp'] && p2.y > 20) p2.y -= moveSpeed;
            if (keys['ArrowDown'] && p2.y < canvas.height - 190) p2.y += moveSpeed;
            if (keys['ArrowLeft'] && p2.x > canvas.width/2 + 10) { p2.x -= moveSpeed; p2.tilt = -0.04; }
            if (keys['ArrowRight'] && p2.x < canvas.width - 160) { p2.x += moveSpeed; p2.tilt = 0.04; }

            p1.score += speed / 20;
            p2.score += speed / 20;

            let topScore = Math.max(p1.score, p2.score);
            if (topScore > level * 2000 && level < 5) {
                level++;
                speed += 5;
                document.getElementById('level').innerText = level;
            }

            if (topScore >= 10000) {
                gameWin();
                return;
            }

            roadOffset += speed;
            draw();
            requestAnimationFrame(update);
        }

        function gameWin() {
            gameActive = false;
            msgOverlay.style.visibility = 'visible';
            msgOverlay.style.opacity = '1';
            document.getElementById('title').innerText = "CORRIDA FINALIZADA!";
            document.getElementById('sub-msg').innerText = p1.score > p2.score ? "JOGADOR 1 VENCEU!" : "JOGADOR 2 VENCEU!";
            document.getElementById('start-btn').innerText = "JOGAR NOVAMENTE";
        }

        function draw() {
            const theme = themes[level - 1];
            ctx.fillStyle = theme.grass;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = theme.road;
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);
            ctx.fillStyle = "#FFF";
            ctx.fillRect(55, 0, 10, canvas.height);
            ctx.fillRect(canvas.width - 65, 0, 10, canvas.height);
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 6;
            ctx.setLineDash([60, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();

            renderCar(car1Img, p1);
            renderCar(car2Img, p2);

            document.getElementById('p1-score').innerText = Math.floor(p1.score);
            document.getElementById('p2-score').innerText = Math.floor(p2.score);
        }

        function renderCar(img, car) {
            ctx.save();
            ctx.translate(car.x + car.w/2, car.y + car.h/2);
            ctx.rotate(car.tilt);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowOffsetY = 15;
            ctx.drawImage(img, -car.w/2, -car.h/2, car.w, car.h);
            ctx.restore();
        }

        // Desenha a primeira tela assim que as imagens carregarem
        window.onload = () => {
            draw();
        };
    </script>
